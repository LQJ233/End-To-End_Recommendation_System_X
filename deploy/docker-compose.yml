version: "3.8"

# Single-machine infra for the recommendation system.
# Start with: docker compose -f deploy/docker-compose.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: recsys_mysql
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: change_me
      MYSQL_DATABASE: end_to_end_recommendation_system_x
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.2
    container_name: recsys_redis
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: recsys_zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports: ["2181:2181"]

  kafka:
    image: bitnami/kafka:3.7
    container_name: recsys_kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_ENABLE_KRAFT: "no"
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: recsys_milvus_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://0.0.0.0:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: recsys_milvus_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data

  milvus:
    image: milvusdb/milvus:v2.4.5
    container_name: recsys_milvus
    depends_on: [milvus-etcd, milvus-minio]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    command: ["milvus", "run", "standalone"]

volumes:
  mysql_data:
  redis_data:
