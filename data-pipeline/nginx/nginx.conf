# Run with: nginx -p E:/End-To-End_Recommendation_System_X/data-pipeline/nginx -c nginx.conf
# Requires openresty (or nginx with lua-nginx-module + lua-resty-kafka).
worker_processes 1;
error_log E:/End-To-End_Recommendation_System_X/logs/nginx_error.log info;

events {
    worker_connections 256;
}

http {
    lua_package_path 'E:/End-To-End_Recommendation_System_X/data-pipeline/nginx/lua/?.lua;;';
    access_log E:/End-To-End_Recommendation_System_X/logs/nginx_access.log;
    resolver 127.0.0.1 ipv6=off;

    server {
        listen 8088;
        server_name localhost;

        # CORS preflight
        location /track/ {
            default_type application/json;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Allow-Methods 'POST,OPTIONS' always;
            if ($request_method = OPTIONS) { return 204; }

            content_by_lua_file E:/End-To-End_Recommendation_System_X/data-pipeline/nginx/lua/track_behavior.lua;
        }
    }
}
